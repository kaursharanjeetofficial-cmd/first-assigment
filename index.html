<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment #1 UI Components</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div  class="nav__logo">Echo </div>
            <ul class="nav__menu" >
                <li> <a class="nav_element">Home</a></li>
                 <li> <a class="nav_element">Featured</a></li>
                  <li> <a class="nav_element">Contact Us</a></li>
                   <li> <a class="nav_element">Info</a></li>
            </ul>
        </nav>
    </header>
    <main class="main_content">
        <h3>My Projects</h3>

        <input type="text" id="searchInput" placeholder="Search projects...">


<section  id="my_projects" class="my_projects">

</section>

         <section class="contactus">
        <h2>
            Contact us
        </h2>
        <form method="post" class="contactus_form">
            <div class="contactus__div">
                <label for="name">Name : </label>
                <input type="text" id="name" name="name" placeholder="Enter your name..." required>
            </div>
             <div  class="contactus__div">
                <label for="name">Email : </label>
                <input type="text" id="email" name="email" placeholder="Enter you email..." required>
            </div>
               <div  class="contactus__div">
                    <label for="subject">Subject</label>

                    <select id="subject" required>
                        <option value="">Select a subject</option>
                        <option>Info</option>
                        <option>Complaint</option>
                        <option>Other</option>
                    </select>
               </div>
             <div  class="contactus__div">
                <label for="name">Message : </label>
                <textarea  id="message" name="message" rows="5" 
                minlength="5"
                placeholder="Please type your message here...." required></textarea>
            </div>
<button type="submit"  class="send_btn">Send</button>
        </form>
    </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
